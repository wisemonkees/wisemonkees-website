                    <h1>About Planet No More</h1>
                    <p>
                        Planet No More is an addictive arcade-incremental game where you command an orbiting ship to dismantle celestial bodies. 
                        As your cannons tear through the planet's surface, it dynamically shatters and withers away, 
                        scattering valuable resources into the void for you to scavenge before your fuel runs out. 
                        With every upgrade to your weapons and fleet, you’ll push further into the galaxy, strategically grinding down planets 
                        to their cores to unlock the next celestial bodies.
                    </p>
                    <h2>
                        Features
                    </h2>
                    <ul>
                        <li>
                            <b>Dynamic 3D Destruction:</b>
                            Experience the visual satisfaction of rotating 3D planets that realistically shatter and erode as you bombard them.
                        </li>
                        <li>
                            <b>Expansive Meta-Progression:</b>
                            Invest your earnings into a deep tech tree to enhance your firepower, fuel and resource collection efficiency.
                        </li>
                        <li>
                            <b>Fuel Management:</b>
                            Race against a depleting fuel bar and optimize your run time by balancing raw power with fuel-efficiency upgrades.
                        </li>
                        <li>
                            <b>Tactile Resource Scavenging:</b>
                            Actively collect scattered debris with your cursor, using upgradable magnet mechanics to sweep up cosmic riches.
                        </li>
                        <li>
                            <b>Random Cosmic Events:</b>
                            Boost your stats for a short period of time by collecting passing meteors.
                        </li>
                        <li>
                            <b>Celestial Escalation:</b>
                            Completely demolish celestial bodies to earn rare “Celestial Cores”, the currency required to unlock the next body.
                        </li>
                    </ul>
                    <h2>Controls</h2>
                    <ul>
                        <li><strong>Mouse</strong>
                        </li>
                        <li><strong>Gamepad / Touch</strong>
                        </li>
